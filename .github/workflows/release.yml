name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guard:
    name: Tag / version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          echo "Tag: $TAG  |  package.json: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: guard
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate — no artifact on red)
        run: npm test

      - name: Smoke build (unpacked)
        run: npm run dist:dir
        # Validates packaging config without producing a full installer.
        # GUI launch under CI sandbox is not verified (mirrors Phase 18 note).

      # Code signing is optional (Phase 43). When no certificate secret is configured, GitHub
      # injects CSC_LINK as an empty string and electron-builder treats "" as a certificate
      # file path — it resolves to the repo root and fails with "<dir> not a file". Detect the
      # certificate first, then run the matching build so an absent secret yields a clean
      # unsigned build (the "absent → unsigned, never a failure" behavior this workflow intends).
      - name: Detect signing certificate
        id: signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish installers (signed)
        if: steps.signing.outputs.available == 'true'
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and publish installers (unsigned)
        if: steps.signing.outputs.available == 'false'
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No certificate → force an explicit unsigned build (never pass the empty CSC_LINK).
          CSC_IDENTITY_AUTO_DISCOVERY: false

  refresh-landing:
    name: Refresh landing site (Vercel deploy hook)
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Landing Page plan §3/§5 Phase 51: a new release rebuilds the landing site so its
      # download buttons resolve to the new version without a manual redeploy. Guarded —
      # if VERCEL_DEPLOY_HOOK_URL is not configured, this no-ops (never fails the release).
      - name: Trigger Vercel deploy hook (if configured)
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping landing redeploy."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Triggered Vercel rebuild of the landing site."
