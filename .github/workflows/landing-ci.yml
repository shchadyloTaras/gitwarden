name: Landing CI

# Landing Page plan §5 Phase 51: a landing/-scoped gate, separate from the app's release
# matrix. Everything runs OFFLINE (Vitest mocks the GitHub API; the e2e build uses
# RELEASE_MODE=fixture and blocks api.github.com), so no network/release is required.

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing-ci.yml'
  pull_request:
    paths:
      - 'landing/**'
      - '.github/workflows/landing-ci.yml'

defaults:
  run:
    working-directory: landing

jobs:
  verify:
    name: Lint · type-check · test · build · e2e (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Type-check (.astro)
        run: npm run check

      - name: Type-check (src/lib)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (static)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright, offline)
        run: npm run e2e
