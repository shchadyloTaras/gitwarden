appId: com.gitwarden.app
productName: GitWarden
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/icon.png
    to: icon.png
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
linux:
  icon: resources/icon.png
  target:
    - target: AppImage
    - target: deb
win:
  icon: resources/icon.png
  target:
    - target: nsis
