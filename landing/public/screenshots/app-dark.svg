<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-hidden="true" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- GitWarden app mockup — dark. Placeholder until real captures exist. -->
  <rect width="800" height="500" rx="14" fill="#09090b" />
  <rect x="8" y="8" width="784" height="484" rx="12" fill="#18181b" stroke="#27272a" />

  <!-- Title bar -->
  <rect x="8" y="8" width="784" height="44" rx="12" fill="#09090b" />
  <circle cx="32" cy="30" r="6" fill="#ef4444" />
  <circle cx="52" cy="30" r="6" fill="#eab308" />
  <circle cx="72" cy="30" r="6" fill="#22c55e" />
  <!-- profile chip -->
  <rect x="540" y="18" width="110" height="24" rx="12" fill="#1e1b4b" stroke="#6366f1" />
  <circle cx="556" cy="30" r="5" fill="#6366f1" />
  <text x="568" y="34" font-size="12" fill="#a5b4fc">Work</text>
  <!-- safety badge -->
  <rect x="662" y="18" width="112" height="24" rx="12" fill="#052e16" stroke="#22c55e" />
  <text x="676" y="34" font-size="12" fill="#4ade80">● Safe</text>

  <!-- Sidebar -->
  <rect x="8" y="52" width="180" height="440" fill="#0c0c0e" />
  <rect x="20" y="72" width="156" height="30" rx="7" fill="#27272a" />
  <text x="34" y="92" font-size="13" fill="#f4f4f5">Repositories</text>
  <rect x="20" y="110" width="156" height="30" rx="7" fill="#1e1b4b" />
  <text x="34" y="130" font-size="13" fill="#a5b4fc">Status</text>
  <g fill="#3f3f46">
    <rect x="20" y="150" width="156" height="14" rx="5" />
    <rect x="20" y="178" width="120" height="14" rx="5" />
    <rect x="20" y="206" width="140" height="14" rx="5" />
    <rect x="20" y="234" width="100" height="14" rx="5" />
  </g>

  <!-- Main panel -->
  <text x="212" y="86" font-size="18" fill="#f4f4f5" font-weight="700">Status — feature/login</text>
  <text x="212" y="108" font-size="13" fill="#71717a">3 staged changes · committing as Taras (work@company.com)</text>

  <g>
    <rect x="212" y="128" width="560" height="40" rx="8" fill="#27272a" />
    <text x="228" y="153" font-size="13" fill="#22c55e">+ src/auth/login.ts</text>
    <rect x="212" y="176" width="560" height="40" rx="8" fill="#27272a" />
    <text x="228" y="201" font-size="13" fill="#22c55e">+ src/auth/session.ts</text>
    <rect x="212" y="224" width="560" height="40" rx="8" fill="#27272a" />
    <text x="228" y="249" font-size="13" fill="#eab308">~ README.md</text>
  </g>

  <!-- Safety panel -->
  <rect x="212" y="284" width="560" height="92" rx="10" fill="#052e16" stroke="#16a34a" />
  <text x="230" y="312" font-size="14" fill="#4ade80" font-weight="700">✓ Identity check passed</text>
  <text x="230" y="336" font-size="12" fill="#a1a1aa">Author, email, SSH key, and remote match the Work profile.</text>
  <text x="230" y="356" font-size="12" fill="#a1a1aa">This commit is safe to make.</text>

  <!-- Commit button -->
  <rect x="612" y="396" width="160" height="44" rx="9" fill="#2563eb" />
  <text x="662" y="423" font-size="14" fill="#ffffff" font-weight="700">Commit</text>
</svg>
