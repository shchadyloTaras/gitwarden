<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-hidden="true" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- GitWarden app mockup — light. Placeholder until real captures exist. -->
  <rect width="800" height="500" rx="14" fill="#e4e4e7" />
  <rect x="8" y="8" width="784" height="484" rx="12" fill="#ffffff" stroke="#d0d0d0" />

  <!-- Title bar -->
  <rect x="8" y="8" width="784" height="44" rx="12" fill="#f0f0f0" />
  <circle cx="32" cy="30" r="6" fill="#ef4444" />
  <circle cx="52" cy="30" r="6" fill="#eab308" />
  <circle cx="72" cy="30" r="6" fill="#22c55e" />
  <text x="212" y="35" font-size="14" fill="#0a0a0a" font-weight="700">Repositories</text>

  <!-- Sidebar -->
  <rect x="8" y="52" width="180" height="440" fill="#f4f4f5" />
  <rect x="20" y="72" width="156" height="30" rx="7" fill="rgba(60,124,171,0.16)" />
  <text x="34" y="92" font-size="13" fill="#044a72">Repositories</text>
  <rect x="20" y="110" width="156" height="30" rx="7" fill="#e4e4e4" />
  <text x="34" y="130" font-size="13" fill="#0a0a0a">Status</text>
  <g fill="#d4d4d4">
    <rect x="20" y="150" width="156" height="14" rx="5" />
    <rect x="20" y="178" width="120" height="14" rx="5" />
    <rect x="20" y="206" width="140" height="14" rx="5" />
  </g>

  <!-- Repo rows, each assigned to a profile -->
  <g>
    <rect x="212" y="80" width="560" height="56" rx="10" fill="#f4f4f5" stroke="#d0d0d0" />
    <text x="230" y="104" font-size="14" fill="#0a0a0a" font-weight="600">acme-web</text>
    <text x="230" y="124" font-size="12" fill="#6b6b6b">git@github.com:acme/acme-web.git</text>
    <rect x="650" y="98" width="100" height="22" rx="11" fill="rgba(60,124,171,0.16)" stroke="#2a6a99" />
    <text x="666" y="113" font-size="11" fill="#044a72">Work</text>

    <rect x="212" y="148" width="560" height="56" rx="10" fill="#f4f4f5" stroke="#d0d0d0" />
    <text x="230" y="172" font-size="14" fill="#0a0a0a" font-weight="600">dotfiles</text>
    <text x="230" y="192" font-size="12" fill="#6b6b6b">git@github.com:me/dotfiles.git</text>
    <rect x="638" y="166" width="112" height="22" rx="11" fill="#e4e4e4" stroke="#8a8a8a" />
    <text x="654" y="181" font-size="11" fill="#0a0a0a">Personal</text>

    <rect x="212" y="216" width="560" height="56" rx="10" fill="#f4f4f5" stroke="#d0d0d0" />
    <text x="230" y="240" font-size="14" fill="#0a0a0a" font-weight="600">client-portal</text>
    <text x="230" y="260" font-size="12" fill="#6b6b6b">git@github.com:client/portal.git</text>
    <rect x="660" y="234" width="90" height="22" rx="11" fill="rgba(60,124,171,0.16)" stroke="#2a6a99" />
    <text x="676" y="249" font-size="11" fill="#044a72">Client</text>
  </g>

  <!-- Hint banner -->
  <rect x="212" y="300" width="560" height="64" rx="10" fill="#f0f0f0" stroke="#d0d0d0" />
  <text x="230" y="330" font-size="13" fill="#0a0a0a" font-weight="600">Each repository is bound to one profile.</text>
  <text x="230" y="351" font-size="12" fill="#6b6b6b">GitWarden checks it before every commit and push.</text>
</svg>
