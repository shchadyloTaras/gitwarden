<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" width="1200" height="940" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="940" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">GitWarden — process &amp; module boundaries</text>
  <text x="600" y="74" text-anchor="middle" font-size="14.5" fill="#64748b">core ↔ main ↔ preload ↔ renderer · arrows show the only allowed crossings</text>

  <!-- ===================== RENDERER ===================== -->
  <rect x="70" y="98" width="690" height="118" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="92" y="128" font-size="19" font-weight="700" fill="#1e3a8a">RENDERER</text>
  <text x="92" y="150" font-size="13.5" fill="#1e40af">preload/.. → renderer · React UI · process: renderer</text>
  <text x="92" y="180" font-size="13" fill="#1d4ed8">src/renderer/ — components · screens · store · types</text>
  <text x="92" y="202" font-size="12.5" fill="#b91c1c">✗ no Node · ✗ no fs / child_process · contextIsolation + sandbox + nodeIntegration:false</text>

  <!-- arrow R <-> P -->
  <line x1="200" y1="216" x2="200" y2="280" stroke="#334155" stroke-width="2.2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <rect x="232" y="226" width="496" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="248" y="244" font-size="12.5" font-weight="600" fill="#334155">contextBridge → typed window.api.*</text>
  <text x="248" y="262" font-size="12" fill="#64748b">the renderer reaches main ONLY through this bridge — no direct Node</text>

  <!-- ===================== PRELOAD ===================== -->
  <rect x="70" y="280" width="690" height="96" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="92" y="310" font-size="19" font-weight="700" fill="#5b21b6">PRELOAD — the only bridge</text>
  <text x="92" y="334" font-size="13.5" fill="#6d28d9">preload/index.ts · process: preload (isolated)</text>
  <text x="92" y="358" font-size="12.5" fill="#6d28d9">exposes a typed contextBridge API · IPC payloads are Zod-validated at this boundary</text>

  <!-- arrow P <-> M -->
  <line x1="200" y1="376" x2="200" y2="432" stroke="#334155" stroke-width="2.2" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>
  <rect x="232" y="382" width="496" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="248" y="400" font-size="12.5" font-weight="600" fill="#334155">IPC — ipcMain / ipcRenderer</text>
  <text x="248" y="418" font-size="12" fill="#64748b">every payload validated with Zod before main acts on it</text>

  <!-- ===================== MAIN ===================== -->
  <rect x="70" y="432" width="690" height="120" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="92" y="462" font-size="19" font-weight="700" fill="#92400e">MAIN — Electron main (Node access)</text>
  <text x="92" y="486" font-size="13.5" fill="#b45309">src/main/ — ipc · git (GitRunner) · ai · security · services · storage · testing</text>
  <text x="92" y="510" font-size="12.5" fill="#b45309">orchestrates the app; the ONLY layer that touches the OS, network &amp; child processes</text>
  <text x="92" y="534" font-size="12.5" fill="#92400e" font-weight="600">GitRunner is the single execFile caller — args array, never a shell, paths after --</text>

  <!-- arrow M -> C (one-way import) -->
  <line x1="200" y1="552" x2="200" y2="612" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <rect x="232" y="560" width="496" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="248" y="578" font-size="12.5" font-weight="600" fill="#334155">imports pure logic (one-way ↓)</text>
  <text x="248" y="596" font-size="12" fill="#64748b">core never imports main / electron / node — the dependency only points down</text>

  <!-- ===================== CORE ===================== -->
  <rect x="70" y="612" width="690" height="150" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="92" y="642" font-size="19" font-weight="700" fill="#14532d">CORE — pure · the verifiability backbone</text>
  <text x="92" y="666" font-size="13.5" fill="#15803d">src/core/ — safety (Safety Engine) · parsers (porcelain) · ai · config · github · types</text>
  <text x="92" y="690" font-size="12.5" fill="#b91c1c">✗ no child_process · ✗ no fs · ✗ no electron · ✗ no DOM (window/document)</text>
  <text x="92" y="714" font-size="12.5" fill="#15803d">every service is an interface + injected → runs under plain Vitest, offline</text>
  <text x="92" y="740" font-size="12.5" fill="#166534" font-style="italic">imports nothing impure — pure types may also be imported by the renderer</text>

  <!-- ===================== EXTERNALS ===================== -->
  <text x="955" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">OUTSIDE WORLD (main only)</text>

  <rect x="800" y="432" width="320" height="62" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
  <text x="820" y="460" font-size="15" font-weight="700" fill="#334155">git binary</text>
  <text x="820" y="481" font-size="12" fill="#64748b">child process · resolved at runtime (≥ 2.30)</text>

  <rect x="800" y="508" width="320" height="62" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
  <text x="820" y="536" font-size="15" font-weight="700" fill="#334155">GitHub API · AI providers</text>
  <text x="820" y="557" font-size="12" fill="#64748b">network · AI is advisory-only (never a git action)</text>

  <rect x="800" y="612" width="320" height="62" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
  <text x="820" y="640" font-size="15" font-weight="700" fill="#334155">safeStorage · userData (JSON)</text>
  <text x="820" y="661" font-size="12" fill="#64748b">secrets encrypted · non-secret config as JSON</text>

  <!-- arrows main -> externals -->
  <line x1="760" y1="470" x2="800" y2="463" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="765" y="455" font-size="11" fill="#475569">execFile</text>
  <line x1="760" y1="500" x2="800" y2="535" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="525" x2="800" y2="640" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- core is intentionally NOT connected to externals: callout -->
  <text x="955" y="706" text-anchor="middle" font-size="12.5" font-style="italic" fill="#16a34a">core has no line to the outside —</text>
  <text x="955" y="724" text-anchor="middle" font-size="12.5" font-style="italic" fill="#16a34a">that is what keeps it testable.</text>

  <!-- ===================== FOOTER RULES ===================== -->
  <rect x="70" y="788" width="1050" height="118" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="92" y="814" font-size="14" font-weight="700" fill="#0f172a">Non-negotiable crossing rules</text>
  <text x="92" y="838" font-size="12.5" fill="#334155">1 · src/core/ is pure — no child_process / fs / electron / DOM.    2 · all git execution goes through GitRunner only (src/main/git/).</text>
  <text x="92" y="860" font-size="12.5" fill="#334155">3 · git args are always an array, never string-interpolated; path args after --.    4 · only --local git config — never --global / --system.</text>
  <text x="92" y="882" font-size="12.5" fill="#334155">5 · never log secrets.    6 · destructive / remote actions stay behind confirmation.    7 · AI is advisory-only — it never triggers a git action.</text>

  <text x="1120" y="930" text-anchor="end" font-size="11" fill="#94a3b8">Source: docs/architecture/diagram.svg / diagram.excalidraw · rules: AGENTS.md, SECURITY.md, docs/adr/</text>
</svg>
